<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Key Management — SOLUM</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --border-accent: rgba(255,255,255,0.15);
            --text-primary: #e8e8ef;
            --text-secondary: #8888a0;
            --text-muted: #555570;
            --accent-green: #34d399;
            --accent-green-dim: rgba(52,211,153,0.15);
            --accent-red: #f87171;
            --accent-red-dim: rgba(248,113,113,0.15);
            --accent-blue: #60a5fa;
            --accent-blue-dim: rgba(96,165,250,0.15);
            --accent-amber: #fbbf24;
            --accent-amber-dim: rgba(251,191,36,0.15);
            --radius: 12px;
            --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }
        #auth-gate {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        #auth-gate.hidden { display: none; }
        .auth-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 40px; text-align: center;
            max-width: 400px; width: 100%;
            backdrop-filter: blur(20px);
        }
        .auth-icon { font-size: 48px; margin-bottom: 16px; }
        .auth-title { font-size: 20px; font-weight: 600; letter-spacing: 2px; margin-bottom: 8px; }
        .auth-subtitle { color: var(--text-secondary); font-size: 13px; margin-bottom: 24px; }
        .auth-input {
            width: 100%; padding: 12px 16px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text-primary); font-size: 14px; outline: none;
            margin-bottom: 12px;
        }
        .auth-input:focus { border-color: var(--accent-blue); }
        .auth-input::placeholder { color: var(--text-muted); }
        .auth-btn {
            width: 100%; padding: 12px; background: var(--accent-blue);
            color: #000; border: none; border-radius: var(--radius-sm);
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.2s;
        }
        .auth-btn:hover { filter: brightness(1.15); }
        .auth-error { color: var(--accent-red); font-size: 13px; margin-top: 12px; min-height: 20px; }

        #main { display: none; padding: 24px; max-width: 1000px; margin: 0 auto; }
        #main.visible { display: block; }

        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
        }
        .page-header h1 { font-size: 22px; font-weight: 600; letter-spacing: 1px; }
        .page-header .back-link {
            color: var(--text-secondary); text-decoration: none; font-size: 13px;
        }
        .page-header .back-link:hover { color: var(--text-primary); }

        .stats-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 12px 20px;
            flex: 1; min-width: 120px; text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: 700; }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .stat-green .stat-value { color: var(--accent-green); }
        .stat-red .stat-value { color: var(--accent-red); }
        .stat-blue .stat-value { color: var(--accent-blue); }

        .add-form {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; margin-bottom: 24px;
        }
        .add-form h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--accent-blue); }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input[type="text"] {
            padding: 8px 12px; background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px; outline: none;
        }
        .form-group input[type="text"]:focus { border-color: var(--accent-blue); }
        .btn-add {
            padding: 8px 20px; background: var(--accent-green); color: #000;
            border: none; border-radius: var(--radius-sm); font-size: 13px;
            font-weight: 600; cursor: pointer; white-space: nowrap;
        }
        .btn-add:hover { filter: brightness(1.15); }

        .agent-list { display: flex; flex-direction: column; gap: 12px; }
        .agent-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; transition: all 0.2s;
        }
        .agent-card:hover { border-color: var(--border-accent); }
        .agent-card.disabled { opacity: 0.5; }

        .agent-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .agent-name { font-size: 16px; font-weight: 600; }
        .agent-status {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; padding: 4px 10px; border-radius: 20px;
        }
        .agent-status.active { background: var(--accent-green-dim); color: var(--accent-green); }
        .agent-status.inactive { background: var(--accent-red-dim); color: var(--accent-red); }

        .agent-key-row {
            display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
            background: var(--bg-secondary); padding: 8px 12px; border-radius: var(--radius-sm);
            font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
            color: var(--text-secondary);
        }
        .agent-key-row .key-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-copy, .btn-reveal {
            padding: 4px 10px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 4px; color: var(--text-secondary); font-size: 11px;
            cursor: pointer; white-space: nowrap;
        }
        .btn-copy:hover, .btn-reveal:hover { color: var(--text-primary); border-color: var(--border-accent); }

        .agent-perms { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
        .perm-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
        .perm-toggle .label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

        .toggle {
            width: 40px; height: 22px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-radius: 11px;
            position: relative; cursor: pointer; transition: all 0.3s;
        }
        .toggle.on { background: var(--accent-green-dim); border-color: var(--accent-green); }
        .toggle .knob {
            width: 16px; height: 16px; background: var(--text-secondary);
            border-radius: 50%; position: absolute; top: 2px; left: 2px;
            transition: all 0.3s;
        }
        .toggle.on .knob { left: 20px; background: var(--accent-green); }
        .perm-toggle.delete-perm .toggle.on { background: var(--accent-red-dim); border-color: var(--accent-red); }
        /* Admin toggle gets gold styling — stands out as highest privilege */
        .perm-toggle.admin-perm .toggle.on { background: rgba(251,191,36,0.15); border-color: #fbbf24; }
        .perm-toggle.admin-perm .toggle.on .knob { background: #fbbf24; }

        .perm-toggle.delete-perm .toggle.on .knob { background: var(--accent-red); }
        .perm-toggle.master-toggle .toggle.on { background: var(--accent-blue-dim); border-color: var(--accent-blue); }
        .perm-toggle.master-toggle .toggle.on .knob { background: var(--accent-blue); }

        .agent-meta {
            display: flex; gap: 16px; font-size: 11px; color: var(--text-muted);
            margin-bottom: 12px;
        }
        .agent-actions { display: flex; gap: 8px; }
        .btn-regen {
            padding: 6px 12px; background: var(--accent-amber-dim); color: var(--accent-amber);
            border: 1px solid rgba(251,191,36,0.3); border-radius: var(--radius-sm);
            font-size: 11px; cursor: pointer;
        }
        .btn-regen:hover { filter: brightness(1.2); }
        .btn-delete {
            padding: 6px 12px; background: var(--accent-red-dim); color: var(--accent-red);
            border: 1px solid rgba(248,113,113,0.3); border-radius: var(--radius-sm);
            font-size: 11px; cursor: pointer;
        }
        .btn-delete:hover { filter: brightness(1.2); }

        .toast {
            position: fixed; bottom: 24px; right: 24px; padding: 12px 20px;
            background: var(--bg-card); border: 1px solid var(--accent-green);
            border-radius: var(--radius-sm); color: var(--accent-green);
            font-size: 13px; opacity: 0; transition: opacity 0.3s;
            pointer-events: none; backdrop-filter: blur(20px);
        }
        .toast.show { opacity: 1; }
        .toast.error { border-color: var(--accent-red); color: var(--accent-red); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 14px; }
    </style>
</head>
<body>
    <div id="auth-gate">
        <div class="auth-card">
            <div class="auth-icon">&#x1f511;</div>
            <div class="auth-title">AGENT KEY MANAGEMENT</div>
            <div class="auth-subtitle">Admin access required to manage agent API keys</div>
            <input type="password" id="auth-key" class="auth-input" placeholder="Enter admin key..." autofocus>
            <button id="auth-submit" class="auth-btn">Authenticate</button>
            <div id="auth-error" class="auth-error"></div>
        </div>
    </div>

    <div id="main">
        <div class="page-header">
            <h1>&#x1f511; AGENT KEYS</h1>
            <a href="/dashboard" class="back-link" style="font-weight:700;letter-spacing:2px;">SOLUM</a>
        </div>

        <div class="stats-bar">
            <div class="stat-card stat-blue">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Total Agents</div>
            </div>
            <div class="stat-card stat-green">
                <div class="stat-value" id="stat-active">0</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-card stat-red">
                <div class="stat-value" id="stat-disabled">0</div>
                <div class="stat-label">Disabled</div>
            </div>
        </div>

        <div class="add-form">
            <h3>+ Register New Agent</h3>
            <div class="form-row">
                <div class="form-group" style="flex:2">
                    <label>Agent Name</label>
                    <input type="text" id="new-agent-name" placeholder="e.g. claude-code-laptop, local-bot, nightly-agent">
                </div>
                <div class="form-group" style="flex:1">
                    <label>Notes (optional)</label>
                    <input type="text" id="new-agent-notes" placeholder="e.g. Surface laptop instance">
                </div>
                <button class="btn-add" id="btn-create">Create Agent</button>
            </div>
        </div>

        <div class="agent-list" id="agent-list">
            <div class="empty-state">
                <div class="icon">&#x1f916;</div>
                <p>No agents registered yet. Create one above.</p>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    var state = { adminKey: '', sessionToken: '', agents: [] };

    function apiCall(method, path, body) {
        // A logged-in dashboard owner authenticates with their session (Bearer);
        // otherwise fall back to the explicit admin key.
        var headers = { 'Content-Type': 'application/json' };
        if (state.sessionToken) headers['Authorization'] = 'Bearer ' + state.sessionToken;
        else headers['X-Admin-Key'] = state.adminKey;
        var opts = { method: method, headers: headers };
        if (body) opts.body = JSON.stringify(body);
        return fetch(path, opts);
    }

    function showToast(msg, isError) {
        var el = document.getElementById('toast');
        el.textContent = msg;
        el.className = isError ? 'toast error show' : 'toast show';
        setTimeout(function() { el.className = 'toast'; }, 3000);
    }

    function esc(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function authenticate() {
        var key = document.getElementById('auth-key').value.trim();
        var errEl = document.getElementById('auth-error');
        if (!key) { errEl.textContent = 'Enter the admin key'; return; }
        errEl.textContent = 'Authenticating...';
        fetch('/admin/api/agents', { headers: { 'X-Admin-Key': key } })
            .then(function(resp) {
                if (resp.ok) {
                    state.adminKey = key;
                    sessionStorage.setItem('agent-admin-key', key);
                    document.getElementById('auth-gate').classList.add('hidden');
                    document.getElementById('main').classList.add('visible');
                    return resp.json();
                } else {
                    errEl.textContent = 'Invalid admin key';
                    return null;
                }
            })
            .then(function(data) {
                if (data) loadAgents(data.agents || []);
            })
            .catch(function() { errEl.textContent = 'Connection failed'; });
    }

    function loadAgents(agents) {
        state.agents = agents;
        var total = agents.length;
        var active = agents.filter(function(a) { return a.enabled; }).length;
        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-active').textContent = active;
        document.getElementById('stat-disabled').textContent = total - active;

        var list = document.getElementById('agent-list');
        if (!agents.length) {
            list.innerHTML = '<div class="empty-state"><div class="icon">&#x1f916;</div><p>No agents registered yet. Create one above.</p></div>';
            return;
        }

        var html = '';
        for (var i = 0; i < agents.length; i++) {
            var a = agents[i];
            var lastUsed = a.last_used ? new Date(a.last_used).toLocaleString() : 'Never';
            var created = new Date(a.created_at).toLocaleDateString();
            html += '<div class="agent-card ' + (a.enabled ? '' : 'disabled') + '" data-id="' + a.id + '">'
                + '<div class="agent-header">'
                + '<span class="agent-name">' + esc(a.agent_name) + '</span>'
                + '<span class="agent-status ' + (a.enabled ? 'active' : 'inactive') + '">' + (a.enabled ? 'Active' : 'Disabled') + '</span>'
                + '</div>'
                + '<div class="agent-key-row">'
                + '<span class="key-text" id="key-' + a.id + '">' + a.api_key_masked + '</span>'
                + '<button class="btn-reveal" onclick="revealKey(' + a.id + ')">Reveal</button>'
                + '<button class="btn-copy" onclick="copyKey(' + a.id + ')">Copy</button>'
                + '</div>'
                + '<div class="agent-perms">'
                + '<div class="perm-toggle master-toggle" onclick="togglePerm(' + a.id + ',\'enabled\',' + (a.enabled ? 0 : 1) + ')">'
                + '<div class="toggle ' + (a.enabled ? 'on' : '') + '"><div class="knob"></div></div>'
                + '<span class="label">Enabled</span></div>'
                + '<div class="perm-toggle" onclick="togglePerm(' + a.id + ',\'can_read\',' + (a.can_read ? 0 : 1) + ')">'
                + '<div class="toggle ' + (a.can_read ? 'on' : '') + '"><div class="knob"></div></div>'
                + '<span class="label">Read</span></div>'
                + '<div class="perm-toggle" onclick="togglePerm(' + a.id + ',\'can_write\',' + (a.can_write ? 0 : 1) + ')">'
                + '<div class="toggle ' + (a.can_write ? 'on' : '') + '"><div class="knob"></div></div>'
                + '<span class="label">Write</span></div>'
                + '<div class="perm-toggle delete-perm" onclick="togglePerm(' + a.id + ',\'can_delete\',' + (a.can_delete ? 0 : 1) + ')">'
                + '<div class="toggle ' + (a.can_delete ? 'on' : '') + '"><div class="knob"></div></div>'
                + '<span class="label">Delete</span></div>'
                + '<div class="perm-toggle admin-perm" onclick="togglePerm(' + a.id + ',\'can_admin\',' + (a.can_admin ? 0 : 1) + ')">'
                + '<div class="toggle ' + (a.can_admin ? 'on' : '') + '"><div class="knob"></div></div>'
                + '<span class="label">Admin</span></div>'
                + '</div>'
                + '<div class="agent-meta">'
                + '<span>Created: ' + created + '</span>'
                + '<span>Last used: ' + lastUsed + '</span>'
                + (a.notes ? '<span>Notes: ' + esc(a.notes) + '</span>' : '')
                + '</div>'
                + '<div class="agent-actions">'
                + '<button class="btn-regen" onclick="regenKey(' + a.id + ',\'' + esc(a.agent_name).replace(/'/g, "\\'") + '\')">Regenerate Key</button>'
                + '<button class="btn-delete" onclick="deleteAgent(' + a.id + ',\'' + esc(a.agent_name).replace(/'/g, "\\'") + '\')">Revoke Agent</button>'
                + '</div></div>';
        }
        list.innerHTML = html;
    }

    function togglePerm(id, field, value) {
        var body = {};
        body[field] = value;
        apiCall('PUT', '/admin/api/agents/' + id, body)
            .then(function(resp) {
                if (resp.ok) {
                    showToast(field + ' ' + (value ? 'ON' : 'OFF'));
                    refresh();
                } else { showToast('Update failed', true); }
            });
    }

    function revealKey(id) {
        apiCall('GET', '/admin/api/agents/' + id)
            .then(function(resp) { return resp.json(); })
            .then(function(data) {
                if (data.agent) document.getElementById('key-' + id).textContent = data.agent.api_key;
            });
    }

    function copyKey(id) {
        apiCall('GET', '/admin/api/agents/' + id)
            .then(function(resp) { return resp.json(); })
            .then(function(data) {
                if (data.agent) {
                    navigator.clipboard.writeText(data.agent.api_key);
                    showToast('Key copied to clipboard');
                }
            });
    }

    function regenKey(id, name) {
        if (!confirm('Regenerate API key for "' + name + '"? The old key stops working immediately.')) return;
        apiCall('POST', '/admin/api/agents/' + id + '/regenerate')
            .then(function(resp) { return resp.json(); })
            .then(function(data) {
                if (data.new_key) {
                    showToast('New key generated');
                    document.getElementById('key-' + id).textContent = data.new_key;
                    refresh();
                } else { showToast('Regenerate failed', true); }
            });
    }

    function deleteAgent(id, name) {
        if (!confirm('Permanently revoke "' + name + '"? Cannot be undone.')) return;
        apiCall('DELETE', '/admin/api/agents/' + id)
            .then(function(resp) {
                if (resp.ok) { showToast('Agent revoked'); refresh(); }
                else { showToast('Delete failed', true); }
            });
    }

    function createAgent() {
        var name = document.getElementById('new-agent-name').value.trim();
        var notes = document.getElementById('new-agent-notes').value.trim();
        if (!name) { showToast('Agent name required', true); return; }
        apiCall('POST', '/admin/api/agents', { agent_name: name, notes: notes })
            .then(function(resp) { return resp.json(); })
            .then(function(data) {
                if (data.agent) {
                    showToast('Agent created!');
                    document.getElementById('new-agent-name').value = '';
                    document.getElementById('new-agent-notes').value = '';
                    refresh();
                } else { showToast(data.error || 'Create failed', true); }
            });
    }

    function refresh() {
        apiCall('GET', '/admin/api/agents')
            .then(function(resp) { return resp.json(); })
            .then(function(data) { loadAgents(data.agents || []); });
    }

    document.getElementById('auth-submit').addEventListener('click', authenticate);
    document.getElementById('auth-key').addEventListener('keydown', function(e) { if (e.key === 'Enter') authenticate(); });
    document.getElementById('btn-create').addEventListener('click', createAgent);
    document.getElementById('new-agent-name').addEventListener('keydown', function(e) { if (e.key === 'Enter') createAgent(); });

    // DEMO_MODE: no login. The server leaves the agent manager fully open in
    // demo, so skip the admin-key gate entirely and drop visitors straight into
    // a usable agents page - create keys, flip permissions, trip the cap, play.
    function _enterNormally() {
        var cached = sessionStorage.getItem('agent-admin-key');
        if (cached) { document.getElementById('auth-key').value = cached; authenticate(); }
    }
    fetch('/api/auth/status')
        .then(function(r) { return r.json(); })
        .then(function(s) {
            if (s && s.demo) {
                state.adminKey = 'demo';  // any value passes server-side in demo
                document.getElementById('auth-gate').classList.add('hidden');
                var main = document.getElementById('main');
                main.classList.add('visible');
                // Demo banner so visitors know these are throwaway sandbox keys.
                var banner = document.createElement('div');
                banner.textContent = 'Demo mode: these are sandbox keys and reset periodically. Create, edit, and delete freely, nothing here is real.';
                banner.style.cssText = 'background:#1a2a3a;border:1px solid #2a4a5a;color:#8fb8d8;padding:10px 16px;border-radius:8px;margin:0 0 14px;font-size:13px;line-height:1.4;';
                main.insertBefore(banner, main.firstChild);
                apiCall('GET', '/admin/api/agents')
                    .then(function(r) { return r.json(); })
                    .then(function(d) { loadAgents((d && d.agents) || []); });
            } else {
                // Logged-in dashboard owner? Use their session token so they
                // manage agents with their normal login, no separate admin key.
                var tok = '';
                try { tok = localStorage.getItem('solum_token') || ''; } catch (e) {}
                if (tok) {
                    state.sessionToken = tok;
                    apiCall('GET', '/admin/api/agents').then(function (r) {
                        if (r.ok) {
                            document.getElementById('auth-gate').classList.add('hidden');
                            document.getElementById('main').classList.add('visible');
                            return r.json().then(function (d) { loadAgents((d && d.agents) || []); });
                        }
                        state.sessionToken = '';  // session not valid here, fall back to admin-key
                        _enterNormally();
                    }).catch(function () { state.sessionToken = ''; _enterNormally(); });
                } else {
                    _enterNormally();
                }
            }
        })
        .catch(_enterNormally);
    </script>
</body>
</html>
